<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timer</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="card">
    <h1>Timer</h1>

    <div class="display" id="display">00:00</div>

    <div class="inputs">
      <div>
        <input type="number" id="input-min" min="0" max="99" value="5" placeholder="00" />
        <label>min</label>
      </div>
      <div class="sep">:</div>
      <div>
        <input type="number" id="input-sec" min="0" max="59" value="0" placeholder="00" />
        <label>sec</label>
      </div>
    </div>

    <div class="buttons">
      <button id="btn-start">Start</button>
      <button id="btn-reset">Reset</button>
    </div>

    <p class="attribution">
      This timer app was made by Arash Ajdari as a project for class at the
      Haskayne School of Business, University of Calgary.
    </p>
  </div>

  <!-- Full-screen canvas for firework particles; overlays the page but passes clicks through -->
  <canvas id="firework-canvas"></canvas>

  <script src="js/script.js"></script>
</body>
</html>
