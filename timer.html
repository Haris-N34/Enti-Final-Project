<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #f0f0f0;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      width: 360px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 36px;
    }

    .display {
      font-size: 80px;
      font-weight: 200;
      letter-spacing: -2px;
      color: #f0f0f0;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      margin-bottom: 40px;
      transition: color 0.3s;
    }

    .display.urgent { color: #ff5a5a; }

    .inputs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 36px;
    }

    .inputs label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #555;
    }

    .inputs input {
      width: 64px;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 20px;
      font-weight: 300;
      text-align: center;
      padding: 10px 6px;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }

    .inputs input::-webkit-outer-spin-button,
    .inputs input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .inputs input:focus { border-color: #555; }

    .sep { font-size: 24px; color: #444; line-height: 1; margin-bottom: 14px; }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    button {
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.05em;
      padding: 14px 28px;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    #btn-start {
      background: #f0f0f0;
      color: #0f0f0f;
      flex: 1;
    }

    #btn-start:hover { opacity: 0.88; }

    #btn-reset {
      background: #252525;
      color: #888;
      border: 1px solid #333;
    }

    #btn-reset:hover { background: #2e2e2e; color: #aaa; }

    .attribution {
      margin-top: 28px;
      font-size: 11px;
      line-height: 1.7;
      color: #aaa;
      text-align: center;
      /* Light glow drop shadow — visible against the dark card background */
      text-shadow:
        0 2px 6px rgba(255, 255, 255, 0.25),
        0 4px 14px rgba(255, 255, 255, 0.12);
    }

    /* Canvas sits on top of everything, ignores pointer events so buttons stay clickable */
    #firework-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Timer</h1>

    <div class="display" id="display">00:00</div>

    <div class="inputs">
      <div>
        <input type="number" id="input-min" min="0" max="99" value="5" placeholder="00" />
        <label>min</label>
      </div>
      <div class="sep">:</div>
      <div>
        <input type="number" id="input-sec" min="0" max="59" value="0" placeholder="00" />
        <label>sec</label>
      </div>
    </div>

    <div class="buttons">
      <button id="btn-start">Start</button>
      <button id="btn-reset">Reset</button>
    </div>

    <p class="attribution">
      This timer app was made by Arash Ajdari as a project for class at the
      Haskayne School of Business, University of Calgary.
    </p>
  </div>

  <!-- Full-screen canvas for firework particles; overlays the page but passes clicks through -->
  <canvas id="firework-canvas"></canvas>

  <script>
    const display   = document.getElementById('display');
    const btnStart  = document.getElementById('btn-start');
    const btnReset  = document.getElementById('btn-reset');
    const inputMin  = document.getElementById('input-min');
    const inputSec  = document.getElementById('input-sec');

    let remaining = 0;
    let interval  = null;
    let running   = false;

    function fmt(n) { return String(n).padStart(2, '0'); }

    function render() {
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      display.textContent = `${fmt(m)}:${fmt(s)}`;
      display.classList.toggle('urgent', remaining <= 10 && remaining > 0);
    }

    function tick() {
      if (remaining <= 0) {
        clearInterval(interval);
        running = false;
        btnStart.textContent = 'Start';
        display.textContent = '00:00';
        display.classList.remove('urgent');
        return;
      }
      remaining--;
      render();
    }

    function getInputSeconds() {
      const m = Math.max(0, parseInt(inputMin.value) || 0);
      const s = Math.min(59, Math.max(0, parseInt(inputSec.value) || 0));
      return m * 60 + s;
    }

    btnStart.addEventListener('click', () => {
      if (running) {
        clearInterval(interval);
        running = false;
        btnStart.textContent = 'Resume';
        inputMin.disabled = false;
        inputSec.disabled = false;
      } else {
        if (!running && remaining === 0) {
          remaining = getInputSeconds();
          if (remaining === 0) return;
        }
        render();
        interval = setInterval(tick, 1000);
        running = true;
        btnStart.textContent = 'Pause';
        inputMin.disabled = true;
        inputSec.disabled = true;
      }
    });

    btnReset.addEventListener('click', () => {
      clearInterval(interval);
      running = false;
      remaining = 0;
      btnStart.textContent = 'Start';
      inputMin.disabled = false;
      inputSec.disabled = false;
      display.classList.remove('urgent');
      const m = Math.max(0, parseInt(inputMin.value) || 0);
      const s = Math.min(59, Math.max(0, parseInt(inputSec.value) || 0));
      display.textContent = `${fmt(m)}:${fmt(s)}`;
    });

    inputMin.addEventListener('input', () => { if (!running && remaining === 0) render2(); });
    inputSec.addEventListener('input', () => { if (!running && remaining === 0) render2(); });

    function render2() {
      const m = Math.max(0, parseInt(inputMin.value) || 0);
      const s = Math.min(59, Math.max(0, parseInt(inputSec.value) || 0));
      display.textContent = `${fmt(m)}:${fmt(s)}`;
    }

    render2();

    // ─── Firework / Sparkle Effect ────────────────────────────────────────────
    //
    // HOW TO CUSTOMIZE:
    //
    //   COLORS — edit the PARTICLE_COLORS array below.
    //     Each entry is any valid CSS color string (hex, rgb, hsl, named color).
    //     Add or remove entries freely; the engine picks one at random per particle.
    //
    //   PARTICLE COUNT — change PARTICLE_COUNT.
    //     Higher values = denser burst (try 40–120). Heavier on the GPU at >150.
    //
    //   ANIMATION SPEED — two knobs:
    //     • PARTICLE_SPEED  – initial launch speed in px/frame. Higher = bigger spread.
    //     • DURATION_MS     – total lifetime of the burst in milliseconds.
    //                         Changing this alone stretches/shrinks the whole animation
    //                         without altering how far particles fly.
    //     • GRAVITY         – downward acceleration per frame (0 = float, 0.15 = arc).

    const PARTICLE_COLORS = [
      '#ff6b6b', // coral red
      '#ffd93d', // golden yellow
      '#6bcb77', // mint green
      '#4d96ff', // sky blue
      '#ff6fd8', // hot pink
      '#c77dff', // violet
      '#00d2ff', // cyan
      '#ff9a3c', // orange
    ];

    const PARTICLE_COUNT = 72;   // number of particles per burst
    const PARTICLE_SPEED = 7;    // base launch speed (px per frame)
    const DURATION_MS    = 2000; // total animation lifetime in ms
    const GRAVITY        = 0.12; // downward pull added each frame

    const canvas = document.getElementById('firework-canvas');
    const ctx    = canvas.getContext('2d');

    // Keep canvas pixel-perfect at any window size
    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    let particles   = [];
    let animationId = null;

    // Build one particle flying in direction `angle` (radians)
    function makeParticle(x, y, angle) {
      const speed = PARTICLE_SPEED * (0.5 + Math.random() * 0.9); // slight variance
      return {
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        radius: 2 + Math.random() * 3,
        color: PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)],
        alpha: 1,
      };
    }

    // Launch a burst from the centre of a DOM element
    function launchFirework(sourceElement) {
      const rect = sourceElement.getBoundingClientRect();
      const originX = rect.left + rect.width  / 2;
      const originY = rect.top  + rect.height / 2;

      // Spread particles evenly around a full 360° circle
      particles = [];
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const angle = (i / PARTICLE_COUNT) * Math.PI * 2;
        particles.push(makeParticle(originX, originY, angle));
      }

      const startTime = performance.now();

      // Cancel any burst already in progress before starting a fresh one
      if (animationId) cancelAnimationFrame(animationId);

      function frame(now) {
        const elapsed  = now - startTime;
        const progress = elapsed / DURATION_MS; // 0 → 1

        if (progress >= 1) {
          // Animation finished — clear the canvas and stop
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          animationId = null;
          return;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach(p => {
          // Move particle outward; gravity bends trajectory downward
          p.x  += p.vx;
          p.y  += p.vy;
          p.vy += GRAVITY; // To remove gravity: set GRAVITY = 0 above

          // Fade out over the animation's lifetime
          p.alpha = 1 - progress;

          ctx.save();
          ctx.globalAlpha = p.alpha;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
          ctx.restore();
        });

        animationId = requestAnimationFrame(frame);
      }

      animationId = requestAnimationFrame(frame);
    }

    // Fire sparkles only when the timer actually starts (not on Pause)
    btnStart.addEventListener('click', () => {
      // `running` is updated by the timer logic above; read state AFTER that toggle
      // by deferring with setTimeout(0), so we see the new value of `running`.
      setTimeout(() => {
        if (running) launchFirework(btnStart);
      }, 0);
    });
    // ─────────────────────────────────────────────────────────────────────────
  </script>
</body>
</html>
